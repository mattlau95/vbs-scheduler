/* normalize either shape (snapshot arrays OR live date-keyed maps) to date->bits */
function normalize(raw){
  const byDate={};
  raw.people.forEach(function(p){
    const a=raw.avail[p];
    if(Array.isArray(a)){ const m={}; raw.days.forEach(function(d,i){ m[d.date]=a[i]; }); byDate[p]=m; }
    else byDate[p]=a||{};
  });

}

function bookedSet(date){ const m=DATA.meetings.find(function(x){return x.date===date;}); const s=new Set(); if(m) for(let i=m.startSlot;i<=m.endSlot;i++) s.add(i); return s; }
function meetingFor(date){ return DATA.meetings.find(function(x){return x.date===date;}); }
function fmtDate(iso){ const p=iso.split("-").map(Number); const mon=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][p[1]-1]; return mon+" "+p[2]; }
function ranges(arr,ml){ const out=[]; let i=0; while(i<arr.length){ if(arr[i]){ let j=i; while(j+1<arr.length&&arr[j+1])j++; if(j-i+1>=ml)out.push([i,j]); i=j+1; } else i++; } return out; }
function bits(p,date){ return (DATA.byDate[p]&&DATA.byDate[p][date])||"000000000000"; }
function cellColor(frac,all){ if(all)return"var(--free)"; if(frac>=0.5)return"var(--partial)"; if(frac>0)return"var(--faint)"; return"var(--none)"; }

function compute(){
  const N=state.selected.length; if(!N)return[];
  const rows=[];
  DATA.days.forEach(function(day){
    if(state.days.indexOf(day.dow)<0)return;
    const booked=bookedSet(day.date);
    const counts=[];
    for(let s=0;s<12;s++){ let c=0; const miss=[]; state.selected.forEach(function(p){ if(bits(p,day.date)[s]==="1")c++; else miss.push(p); }); counts.push({c:c,miss:miss}); }
    const allFree=counts.map(function(x,s){ return x.c===N && !(state.hideClash&&booked.has(s)); });
    const rs=ranges(allFree,state.minLen);
    const near=N>=2?ranges(counts.map(function(x,s){ return x.c===N-1 && !(state.hideClash&&booked.has(s)) && !allFree[s]; }),state.minLen):[];
    if(rs.length||(state.showNearMiss&&near.length)) rows.push({day:day,counts:counts,allFree:allFree,ranges:rs,near:near,booked:booked,N:N});
  });
  return rows;
}

function sparseSelected(){

  const dayChips=WEEK.map(function(d){ return '<button class="chip sm'+(state.days.indexOf(d)>=0?' on':'')+'" data-day="'+d+'">'+d.slice(0,3)+'</button>'; }).join("");
  const mins=[[1,"Any"],[2,"2 hrs"],[3,"3 hrs"],[4,"4+ hrs"]].map(function(o){ return '<button class="'+(state.minLen===o[0]?'on':'')+'" data-min="'+o[0]+'">'+o[1]+'</button>'; }).join("");
  const tog=function(key,lab){ const on=state[key]; return '<button class="tog" data-tog="'+key+'"><span class="box'+(on?' on':'')+'">'+(on?'✓':'')+'</span>'+lab+'</button>'; };
  const sp=sparseSelected();
  const warn=sp.length?'<div class="warn">Heads up: '+sp.join(" and ")+"'s form looks unfilled (almost nothing checked), so results will come back thin while "+(sp.length>1?"they're":"that's")+" included.</div>":"";
  document.getElementById("controls").innerHTML=
    '<div class="card">'+
      '<p class="label">Who needs to be there</p>'+
      '<div class="chips">'+peopleChips+'</div>'+
      '<div style="margin-top:10px;display:flex;gap:16px;"><button class="miniact" data-act="all">Select all</button><button class="miniact" data-act="clear">Clear</button></div>'+
      '<div class="row" style="margin-top:18px;">'+
        '<div><p class="label">Minimum window</p><div class="seg">'+mins+'</div></div>'+
        '<div><p class="label">Options</p><div class="togs">'+tog("hideClash","Skip times that clash with a scheduled practice")+tog("showNearMiss","Show near-misses (all but one free)")+'</div></div>'+
      '</div>'+
      '<div style="margin-top:18px;"><p class="label">Days to consider</p><div class="chips">'+dayChips+'</div></div>'+
      warn+
    '</div>';
}

function renderResults(){
  const el=document.getElementById("results");
  if(!state.selected.length){ el.innerHTML='<div class="empty">Pick at least one person above to see open windows.</div>'; return; }
  const res=compute();
  const total=res.reduce(function(a,r){return a+r.ranges.length;},0);
  let html='<p class="summary"><b>'+total+'</b> open window'+(total===1?'':'s')+' where all '+state.selected.length+' are free <span style="color:var(--muted);font-weight:400;"> · '+esc(state.selected.join(", "))+'</span></p>';
  if(!res.length) html+='<div class="empty">No shared windows under these settings. Try a shorter minimum window, fewer people, or turn on near-misses.</div>';
  res.forEach(function(r){
    const m=meetingFor(r.day.date);
    html+='<div class="day"><div class="dayhead"><div class="dname">'+r.day.dow+'<span>'+fmtDate(r.day.date)+'</span></div>'+
      (m?'<span class="pract">Practice '+SLOT_START[m.startSlot]+'–'+SLOT_END[m.endSlot]+(m.loc?' · '+esc(m.loc):'')+'</span>':'')+'</div>';
    html+='<div class="bar">'+r.counts.map(function(x,s){
      const t=SLOT_START[s]+'–'+SLOT_END[s]+' — '+x.c+' of '+r.N+' free'+(x.miss.length?' (out: '+x.miss.join(", ")+')':'')+(r.booked.has(s)?' · scheduled practice':'');
      return '<div class="cell'+(r.booked.has(s)?' book':'')+'" style="background:'+cellColor(x.c/r.N,r.allFree[s])+'" title="'+esc(t)+'"></div>';
    }).join("")+'</div>';
    html+='<div class="scale"><span>10a</span><span>1p</span><span>4p</span><span>7p</span><span>10p</span></div>';
    if(r.ranges.length) html+='<div class="wins">'+r.ranges.map(function(rg){return '<span class="win">'+SLOT_START[rg[0]]+' – '+SLOT_END[rg[1]]+'</span>';}).join("")+'</div>';
    if(state.showNearMiss) r.near.forEach(function(rg){ const out={}; for(let s=rg[0];s<=rg[1];s++) r.counts[s].miss.forEach(function(p){out[p]=1;}); html+='<div class="near">Near-miss '+SLOT_START[rg[0]]+'–'+SLOT_END[rg[1]]+' — <b>'+esc(Object.keys(out).join(", "))+'</b> can\'t make it</div>'; });
    html+='</div>';
  });
  html+='<div class="legend"><span class="lg"><span class="sw" style="background:var(--free)"></span>All free</span><span class="lg"><span class="sw" style="background:var(--partial)"></span>Most free</span><span class="lg"><span class="sw" style="background:var(--none)"></span>Few / none</span><span class="lg"><span class="sw" style="border:1.5px solid var(--clay);background:#fff"></span>Scheduled practice</span></div>';
  el.innerHTML=html;
}

function renderStatus(){
  const s=document.getElementById("status");
  if(SOURCE==="live"){ const t=GENERATED?new Date(GENERATED):null; s.className="status live refresh"; s.textContent="● Live"+(t?" · "+t.toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):"")+" · refresh"; s.title="Click to re-read the folder"; }
  else { s.className="status snap"+(ENDPOINT?" refresh":""); s.textContent=ENDPOINT?"Saved snapshot · couldn't reach Google · retry":"Saved snapshot"; }
}

function renderFoot(){
  document.getElementById("foot").innerHTML = (SOURCE==="live"
    ? "Reading availability live from your Drive folder. "
    : "Showing the built-in snapshot (May 31 – Aug 1). ")+
    "Any cell that wasn't a green check — including Church, SGL, holiday, and N/A blocks — counts as \"not free.\"";
}

/* ─── Schedule view ─────────────────────────────────────────────────────── */

function practiceAttendance(m){
  const hasData=DATA.days.some(function(d){return d.date===m.date;});
  if(!hasData) return null;
  const canGo=[], cantGo=[];
  DATA.people.forEach(function(p){
    let free=true;
    for(let s=m.startSlot;s<=m.endSlot;s++){
      if(bits(p,m.date)[s]!=='1'){free=false;break;}
    }
    if(free) canGo.push(p); else cantGo.push(p);
  });
  return {canGo:canGo,cantGo:cantGo};
}

function renderSchedule(){
  const el=document.getElementById("schedule-list");
  if(!el||!DATA) return;
  const today=new Date().toISOString().slice(0,10);
  const meetings=[].concat(DATA.meetings).sort(function(a,b){return a.date<b.date?-1:1;});
  const nextIdx=meetings.findIndex(function(m){return m.date>=today;});
  let html='<p class="label">Practice Schedule</p>';
  if(!meetings.length){ html+='<div class="empty">No practices scheduled.</div>'; el.innerHTML=html; return; }
  meetings.forEach(function(m,i){
    const past=m.date<today;
    const isNext=i===nextIdx;
    const dayObj=DATA.days.find(function(d){return d.date===m.date;});
    const dow=dayObj?dayObj.dow:(new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long'}));
    const att=practiceAttendance(m);
    let attHtml='';
    if(!att){ attHtml='<p class="attend-nodata">No availability data for this date.</p>'; }
    else{
      const goChips=att.canGo.map(function(p){return '<span class="achip go">'+esc(p)+'</span>';}).join('');
      const noChips=att.cantGo.map(function(p){return '<span class="achip no">'+esc(p)+'</span>';}).join('');
      attHtml='<div class="attend">'+
        '<div class="attend-group"><span class="attend-lbl">Can make it</span>'+goChips+'</div>'+
        (att.cantGo.length?'<div class="attend-group"><span class="attend-lbl">Can\'t make it</span>'+noChips+'</div>':'')+
        '</div>';
    }
    html+='<div class="sched-item'+(past?' past':'')+'">'+
      '<div class="sched-date"><span class="sched-dow">'+esc(dow)+'</span><span class="sched-d">'+fmtDate(m.date)+'</span></div>'+
      '<div class="sched-info"><span class="sched-lbl">'+esc(m.label)+'</span>'+(m.loc?'<span class="sched-loc">'+esc(m.loc)+'</span>':'')+'</div>'+
      '<div class="sched-time">'+SLOT_START[m.startSlot]+' – '+SLOT_END[m.endSlot]+'</div>'+
      (isNext?'<span class="badge-next">Next</span>':'')+
      attHtml+
      '</div>';
  });
  el.innerHTML=html;
}

function renderSheetConnect(){
  const el=document.getElementById("sheet-connect");
  if(!el) return;
  const savedUrl=localStorage.getItem('vbs_sheet_url')||'';
  let html='<p class="label">Practice Schedule Source</p>'+
    '<p style="font-size:13px;color:var(--muted);margin:0;">'+
    'Connect a Google Sheet (published as CSV) to keep practices up to date without editing this file.</p>'+
    '<div class="sheet-row">'+
    '<input id="sheet-url" type="url" class="sheet-input" placeholder="Google Sheets CSV URL" value="'+esc(savedUrl)+'" />'+
    '<button class="btn-primary" id="sheet-load">'+(sheetLoading?'Loading…':'Load')+'</button>'+
    (SHEET_MEETINGS?'<button class="btn-secondary" id="sheet-clear">Use Snapshot</button>':'')+
    '</div>'+
    '<p class="sheet-hint">Publish your sheet via <strong>File › Share › Publish to web</strong> (choose CSV), then paste the URL above.<br>'+
    'Expected columns: <code>date</code>, <code>label</code>, <code>location</code>, <code>start</code>, <code>end</code> — '+
    'e.g. <code>2026-07-12, Sunday Practice, Agape, 4pm, 6pm</code></p>';
  if(SHEET_MEETINGS) html+='<p class="sheet-ok">● Using '+SHEET_MEETINGS.length+' practice'+(SHEET_MEETINGS.length===1?'':'s')+' from connected sheet</p>';
  else if(!sheetError) html+='<p style="font-size:12px;color:var(--muted);margin:6px 0 0;">Currently using the built-in snapshot schedule.</p>';
  if(sheetError) html+='<p class="sheet-err">'+esc(sheetError)+'</p>';
  el.innerHTML=html;
}

function renderScheduleView(){
  renderSchedule();
  renderSheetConnect();
}

/* ─── Google Sheet CSV loading ──────────────────────────────────────────── */

function normalizeSheetUrl(url){
  // Already a CSV URL — pass through unchanged
  if(url.includes('output=csv')||url.includes('format=csv')) return url;
  // Regular share/edit URL — convert to export URL (needs 20+ char ID to skip the literal 'e' segment)
  const idM=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]{20,})/);
  if(!idM) return url;
  const id=idM[1];
  const gidM=url.match(/[?&]gid=(\d+)/);
  const gid=gidM?gidM[1]:'0';
  return 'https://docs.google.com/spreadsheets/d/'+id+'/export?format=csv&gid='+gid;
}

function timeToSlot(t,isEnd){
  if(!t) return -1;
  t=t.toString().trim().toLowerCase().replace(/\s+/g,'');
  const m=t.match(/^(\d+)(?::(\d+))?(am|pm)?$/);
  if(!m) return -1;
  let h=parseInt(m[1]);
  const min=m[2]?parseInt(m[2]):0;
  if(m[3]==='pm'&&h<12) h+=12;
  if(m[3]==='am'&&h===12) h=0;
  if(!m[3]&&h<=9) h+=12; // treat bare 1–9 as PM
  // End times: "6:00 PM" means the practice ends AT 6pm, so the last covered slot
  // starts at 5pm (slot 7). If there are minutes (e.g. 6:30), extend into the next slot.
  const slot=h-10;
  return isEnd?(min===0?slot-1:slot):slot;
}

function parseCSVRow(line){
  const cols=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){ inQ=!inQ; }
    else if(ch===','&&!inQ){ cols.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

function parseDateStr(s){
  s=s.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const MONTHS={january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  const parts=s.replace(/,/g,' ').trim().split(/\s+/);
  let month=-1, day=-1;
  parts.forEach(function(p){
    const mn=MONTHS[p.toLowerCase()];
    if(mn) month=mn;
    const dn=parseInt(p);
    if(!isNaN(dn)&&dn>=1&&dn<=31) day=dn;
  });
  if(month<0||day<0) return '';
  return '2026-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
}

function parseSheetCSV(text){
  const lines=text.replace(/\r/g,'').trim().split('\n');
  if(lines.length<2) return {meetings:[],headers:[]};
  const headers=parseCSVRow(lines[0]).map(function(h){return h.toLowerCase();});
  const meetings=[];
  for(let i=1;i<lines.length;i++){
    const cols=parseCSVRow(lines[i]);
    const row={};
    headers.forEach(function(h,j){row[h]=cols[j]||'';});
    const rawDate=row.date||row['practice date']||row['day']||'';
    if(!rawDate) continue;
    const dateVal=parseDateStr(rawDate);
    if(!dateVal) continue;
    const startRaw=row.start||row['start time']||row['start slot']||row['begins']||row['from']||'';
    const endRaw=row.end||row['end time']||row['end slot']||row['ends']||row['to']||'';
    const start=timeToSlot(startRaw,false);
    const end=timeToSlot(endRaw,true);
    if(start<0||start>11||end<0||end>11) continue;
    meetings.push({
      date:dateVal,
      label:row.label||row.name||row.practice||row.type||row.event||'Practice',
      loc:row.location||row.loc||row.venue||row.church||row.place||'',
      startSlot:start,endSlot:end
    });
  }
  return {meetings:meetings,headers:headers};
}

function loadSheetMeetings(url){
  sheetLoading=true; sheetError='';
  renderSheetConnect();
  fetch(normalizeSheetUrl(url))
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status); return r.text();})
    .then(function(text){
      const result=parseSheetCSV(text);
      if(!result.meetings.length){
        const found=result.headers.length?'Found headers: '+result.headers.join(', ')+'. ':'';
        throw new Error('No valid rows found. '+found+'Expected: date, label, location, start, end');
      }
      SHEET_MEETINGS=result.meetings;
      localStorage.setItem('vbs_sheet_url',url);
      if(DATA){DATA.meetings=SHEET_MEETINGS; renderResults();}
      sheetLoading=false;
      renderScheduleView();
    })
    .catch(function(err){
      sheetLoading=false;
      sheetError='Could not load sheet: '+err.message+'. Make sure the sheet is published to the web (File › Share › Publish to web, CSV format).';
      renderSheetConnect();
    });
}

/* ─── Event handling ────────────────────────────────────────────────────── */

document.querySelector('.tabs').addEventListener('click',function(e){
  const tab=e.target.closest('[data-tab]');
  if(!tab) return;
  activeTab=tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.tab===activeTab);});
  document.getElementById('finder-view').style.display=activeTab==='finder'?'':'none';
  document.getElementById('schedule-view').style.display=activeTab==='schedule'?'':'none';
  if(activeTab==='schedule') renderScheduleView();
});

document.body.addEventListener("click",function(e){
  const t=e.target.closest("[data-person],[data-day],[data-min],[data-tog],[data-act],.refresh");
  if(e.target.id==='sheet-load'){ const u=document.getElementById('sheet-url').value.trim(); if(u)loadSheetMeetings(u); return; }
  if(e.target.id==='sheet-clear'){ SHEET_MEETINGS=null; sheetError=''; localStorage.removeItem('vbs_sheet_url'); if(DATA){DATA.meetings=SNAPSHOT.meetings; renderResults();} renderScheduleView(); return; }
  if(!t)return;
  if(t.id==="status"&&t.classList.contains("refresh")){ loadLive(); return; }
  if(t.dataset.person!=null){ const p=t.dataset.person; const i=state.selected.indexOf(p); if(i>=0)state.selected.splice(i,1); else state.selected.push(p); }
  else if(t.dataset.day!=null){ const d=t.dataset.day; const i=state.days.indexOf(d); if(i>=0)state.days.splice(i,1); else state.days.push(d); }
  else if(t.dataset.min!=null){ state.minLen=+t.dataset.min; }
  else if(t.dataset.tog!=null){ state[t.dataset.tog]=!state[t.dataset.tog]; }
  else if(t.dataset.act==="all"){ state.selected=DATA.people.slice(); }
  else if(t.dataset.act==="clear"){ state.selected=[]; }
  renderControls(); renderResults();
});

function renderAll(){ renderControls(); renderResults(); renderStatus(); renderFoot(); }

function useData(raw,source){
  DATA=normalize(raw); SOURCE=source; GENERATED=raw.generated||null;
  renderAll();
  const savedUrl=localStorage.getItem('vbs_sheet_url');
  if(savedUrl&&!SHEET_MEETINGS) loadSheetMeetings(savedUrl);
}

function loadLive(){
  if(!ENDPOINT){ useData(SNAPSHOT,"snapshot"); return; }
  const fn="__vbs_cb_"+Date.now();
  const s=document.createElement("script");
  let done=false;
  function cleanup(){ clearTimeout(timer); try{delete window[fn];}catch(_){window[fn]=undefined;} if(s.parentNode)s.parentNode.removeChild(s); }
  const timer=setTimeout(function(){ if(done)return; done=true; cleanup(); useData(SNAPSHOT,"snapshot"); },9000);
  window[fn]=function(d){ if(done)return; done=true; cleanup(); if(d&&!d.error&&d.people){ useData(d,"live"); } else { useData(SNAPSHOT,"snapshot"); } };
  let url=ENDPOINT+(ENDPOINT.indexOf("?")>=0?"&":"?")+"callback="+fn;
  if(TOKEN) url+="&token="+encodeURIComponent(TOKEN);
  s.src=url; s.onerror=function(){ if(done)return; done=true; cleanup(); useData(SNAPSHOT,"snapshot"); };
  document.body.appendChild(s);
}

// boot — show snapshot instantly, then upgrade to live if configured
useData(SNAPSHOT,"snapshot");
loadLive();
</script>
